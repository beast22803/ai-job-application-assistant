<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Glowing background card -->
  <rect width="32" height="32" rx="8" fill="url(#grad)" stroke="rgba(255, 69, 0, 0.3)" stroke-width="1"/>
  <!-- Stylized bold uppercase 'J' and 'A' -->
  <text x="3.5" y="22" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="15" letter-spacing="-1.5px" fill="#FFFFFF">J</text>
  <text x="13.5" y="22" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="15" letter-spacing="-1.5px" fill="#FFFFFF">A</text>
  <!-- Cyan scanning line -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#FF8700"/>
    </linearGradient>
  </defs>
</svg>
